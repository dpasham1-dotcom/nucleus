services:
  - type: web
    name: nucleus-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: nucleus_db
      - key: CORS_ORIGINS
        value: "*"
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.0-flash
      - key: EMERGENT_LLM_KEY
        sync: false
